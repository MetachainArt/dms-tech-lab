    <rect x="650" y="340" width="300" height="300" rx="22"/>
    <rect x="1070" y="340" width="300" height="300" rx="22"/>
  </g>
  <g fill="#e2e8f0" font-family="Pretendard, Segoe UI, sans-serif" font-size="28" text-anchor="middle">
    <text x="380" y="430">Canary Input Set</text>
    <text x="800" y="430">Evaluator Matrix</text>
    <text x="1220" y="430">Promotion Gate</text>
  </g>
  <g stroke="#22d3ee" stroke-width="5" stroke-linecap="round">
