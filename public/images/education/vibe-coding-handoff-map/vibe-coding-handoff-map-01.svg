  <path d="M740 450H800" stroke="#6AB4B1" stroke-width="10" stroke-linecap="round"/>
  <path d="M1080 450H1140" stroke="#C29AF2" stroke-width="10" stroke-linecap="round"/>
  <rect x="120" y="690" width="1300" height="90" rx="18" fill="#0E1728" stroke="#31486F"/>
  <text x="160" y="745" fill="#E7EEF9" font-size="24" font-family="Arial, sans-serif">Core rule: every output must carry a state label, decision list, open risks, and acceptance contract before it moves forward.</text>
