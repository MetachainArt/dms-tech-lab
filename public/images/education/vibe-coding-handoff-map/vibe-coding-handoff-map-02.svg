<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="36" fill="#0F172A"/>
  <rect x="70" y="70" width="1460" height="760" rx="28" fill="#111C32" stroke="#32496E"/>
  <text x="110" y="150" fill="#EDF4FF" font-size="44" font-family="Arial, sans-serif" font-weight="700">Decision-Oriented Handoff Board</text>
  <text x="110" y="200" fill="#99AECF" font-size="24" font-family="Arial, sans-serif">Keep only what the next builder needs to maintain speed and quality</text>
  <rect x="130" y="270" width="420" height="440" rx="28" fill="#172540" stroke="#597CB8"/>
  <rect x="590" y="270" width="420" height="440" rx="28" fill="#1B2D27" stroke="#62B593"/>
  <rect x="1050" y="270" width="420" height="440" rx="28" fill="#2E241E" stroke="#D79B62"/>
  <text x="170" y="340" fill="#E6F0FF" font-size="30" font-family="Arial, sans-serif" font-weight="700">Fixed decisions</text>
  <text x="170" y="398" fill="#B8CDEF" font-size="22" font-family="Arial, sans-serif">• hero hierarchy stays</text>
  <text x="170" y="436" fill="#B8CDEF" font-size="22" font-family="Arial, sans-serif">• two-step form flow</text>
  <text x="170" y="474" fill="#B8CDEF" font-size="22" font-family="Arial, sans-serif">• mobile-first spacing</text>
  <text x="630" y="340" fill="#E8FFF4" font-size="30" font-family="Arial, sans-serif" font-weight="700">Open decisions</text>
  <text x="630" y="398" fill="#B8E5D2" font-size="22" font-family="Arial, sans-serif">• pricing block density</text>
  <text x="630" y="436" fill="#B8E5D2" font-size="22" font-family="Arial, sans-serif">• testimonial position</text>
  <text x="630" y="474" fill="#B8E5D2" font-size="22" font-family="Arial, sans-serif">• metric wording</text>
  <text x="1090" y="340" fill="#FFF0E2" font-size="30" font-family="Arial, sans-serif" font-weight="700">Approval checkpoints</text>
  <text x="1090" y="398" fill="#FFD9BC" font-size="22" font-family="Arial, sans-serif">• value read in 5 seconds</text>
  <text x="1090" y="436" fill="#FFD9BC" font-size="22" font-family="Arial, sans-serif">• one flow completes cleanly</text>
  <text x="1090" y="474" fill="#FFD9BC" font-size="22" font-family="Arial, sans-serif">• one recovery path exists</text>
  <path d="M550 490H590" stroke="#7BA0D8" stroke-width="10" stroke-linecap="round"/>
  <path d="M1010 490H1050" stroke="#7CC8AC" stroke-width="10" stroke-linecap="round"/>
  <rect x="130" y="760" width="1340" height="40" rx="12" fill="#0C1424"/>
  <text x="170" y="788" fill="#9FB4D4" font-size="20" font-family="Arial, sans-serif">A useful handoff is not a file dump. It is a compact map of locked choices, open choices, risks, and acceptance rules.</text>
</svg>